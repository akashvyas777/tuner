<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitch Counter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#container {
  width: 90%;
}

#note {
  font-size: 80px;
  font-weight: bold;
}

#freq {
  opacity: 0.6;
}

#meter {
  width: 100%;
  height: 10px;
  background: #333;
  margin-top: 20px;
  position: relative;
}

#needle {
  width: 4px;
  height: 100%;
  background: #00ffcc;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="container">
  <div id="note">--</div>
  <div id="freq">0 Hz</div>
  <div id="meter">
    <div id="needle"></div>
  </div>
</div>

<script>
let audioContext;
let analyser;
let microphone;

const noteEl = document.getElementById("note");
const freqEl = document.getElementById("freq");
const needle = document.getElementById("needle");

// Note mapping
const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

function getNote(frequency) {
  const A4 = 440;
  const noteNumber = 12 * (Math.log2(frequency / A4)) + 69;
  return Math.round(noteNumber);
}

function getFrequency(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function updatePitch() {
  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  let sum = 0;
  for (let i = 0; i < buffer.length; i++) {
    sum += buffer[i] * buffer[i];
  }
  let rms = Math.sqrt(sum / buffer.length);

  if (rms < 0.01) {
    requestAnimationFrame(updatePitch);
    return;
  }

  let freq = autoCorrelate(buffer, audioContext.sampleRate);

  if (freq !== -1) {
    const noteNum = getNote(freq);
    const noteName = noteStrings[noteNum % 12];
    const targetFreq = getFrequency(noteNum);

    let cents = 1200 * Math.log2(freq / targetFreq);

    noteEl.textContent = noteName;
    freqEl.textContent = freq.toFixed(2) + " Hz";

    // Move needle (-50 to +50 cents)
    let pos = Math.max(-50, Math.min(50, cents));
    needle.style.left = (50 + pos) + "%";
  }

  requestAnimationFrame(updatePitch);
}

// Basic autocorrelation
function autoCorrelate(buffer, sampleRate) {
  let SIZE = buffer.length;
  let bestOffset = -1;
  let bestCorrelation = 0;

  for (let offset = 8; offset < 1000; offset++) {
    let correlation = 0;

    for (let i = 0; i < SIZE - offset; i++) {
      correlation += buffer[i] * buffer[i + offset];
    }

    correlation = correlation / SIZE;

    if (correlation > bestCorrelation) {
      bestCorrelation = correlation;
      bestOffset = offset;
    }
  }

  if (bestCorrelation > 0.01) {
    return sampleRate / bestOffset;
  }

  return -1;
}

// Start mic
async function start() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  microphone = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  microphone.connect(analyser);

  updatePitch();
}

// Start on tap
document.body.addEventListener("click", start, { once: true });
</script>

</body>
</html>
