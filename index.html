<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Tuner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#note {
  font-size: 80px;
  font-weight: bold;
}

#freq {
  opacity: 0.6;
}

#meter {
  width: 100%;
  height: 12px;
  background: #333;
  margin-top: 25px;
  position: relative;
}

#needle {
  width: 4px;
  height: 100%;
  background: #00ffcc;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  transition: left 0.05s linear;
}
</style>
</head>

<body>

<div>
  <div id="note">--</div>
  <div id="freq">0 Hz</div>
  <div id="meter">
    <div id="needle"></div>
  </div>
</div>

<script>
let audioContext, analyser, mic;

const noteEl = document.getElementById("note");
const freqEl = document.getElementById("freq");
const needle = document.getElementById("needle");

const noteStrings = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

let smoothFreq = 0;

// NOTE FUNCTIONS
function getNote(freq) {
  return Math.round(12 * Math.log2(freq / 440) + 69);
}

function getFreq(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

// IMPROVED AUTOCORRELATION
function autoCorrelate(buffer, sampleRate) {
  let SIZE = buffer.length;
  let rms = 0;

  for (let i = 0; i < SIZE; i++) {
    rms += buffer[i] * buffer[i];
  }
  rms = Math.sqrt(rms / SIZE);

  if (rms < 0.01) return -1;

  let bestOffset = -1;
  let bestCorrelation = 0;

  for (let offset = 20; offset < 1000; offset++) {
    let correlation = 0;

    for (let i = 0; i < SIZE - offset; i++) {
      correlation += buffer[i] * buffer[i + offset];
    }

    correlation = correlation / SIZE;

    if (correlation > bestCorrelation) {
      bestCorrelation = correlation;
      bestOffset = offset;
    }
  }

  if (bestCorrelation > 0.01) {
    // 🔥 Peak interpolation (more accuracy)
    let x1 = bestOffset - 1;
    let x2 = bestOffset;
    let x3 = bestOffset + 1;

    let y1 = correlationAt(buffer, x1);
    let y2 = correlationAt(buffer, x2);
    let y3 = correlationAt(buffer, x3);

    let shift = (y3 - y1) / (2 * (2 * y2 - y1 - y3));
    let refined = bestOffset + shift;

    return sampleRate / refined;
  }

  return -1;
}

function correlationAt(buffer, offset) {
  let sum = 0;
  for (let i = 0; i < buffer.length - offset; i++) {
    sum += buffer[i] * buffer[i + offset];
  }
  return sum / buffer.length;
}

// MAIN LOOP
function update() {
  let buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  let freq = autoCorrelate(buffer, audioContext.sampleRate);

  if (freq !== -1) {

    // 🔥 smoothing
    smoothFreq = smoothFreq * 0.8 + freq * 0.2;

    let noteNum = getNote(smoothFreq);
    let noteName = noteStrings[noteNum % 12];
    let target = getFreq(noteNum);

    let cents = 1200 * Math.log2(smoothFreq / target);

    noteEl.textContent = noteName;
    freqEl.textContent = smoothFreq.toFixed(2) + " Hz";

    let clamped = Math.max(-50, Math.min(50, cents));
    needle.style.left = (50 + clamped) + "%";

    // 🎯 IN-TUNE COLOR
    if (Math.abs(cents) < 2) {
      needle.style.background = "#00ff00"; // green
    } else {
      needle.style.background = "#00ffcc"; // default
    }
  }

  requestAnimationFrame(update);
}

// START AUDIO
async function start() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();

  let stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mic = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();

  analyser.fftSize = 4096; // 🔥 higher resolution
  mic.connect(analyser);

  update();
}

document.body.addEventListener("click", start, { once: true });
</script>

</body>
</html>
